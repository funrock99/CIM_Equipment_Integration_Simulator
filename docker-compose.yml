version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cim_user
      POSTGRES_PASSWORD: cim_password
      POSTGRES_DB: cim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cim_user:cim_password@db:5432/cim_db
    depends_on:
      - db
    volumes:
      - .:/app

  simulator:
    build: .
    command: python simulator/equipment_simulator.py
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app

  dashboard-react:
    build: ./dashboard-react
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./dashboard-react:/app
      - /app/node_modules

volumes:
  postgres_data:
